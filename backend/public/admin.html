<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fields Admin</title>
  <style>
    :root { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial; }
    body { margin: 24px; }
    header { display:flex; align-items:baseline; gap:12px; margin-bottom:16px; }
    h1 { font-size: 20px; margin:0; }
    .row { display:flex; gap:16px; align-items:center; }
    .grid { display:grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap:12px; }
    label { display:flex; flex-direction:column; gap:6px; font-size:12px; }
    input, textarea, select { padding:8px; border:1px solid #ddd; border-radius:8px; font-size:14px; }
    textarea { min-height: 70px; }
    button { padding:8px 12px; border:1px solid #ddd; border-radius:8px; background:#111; color:white; cursor:pointer; }
    button.ghost { background:white; color:#111; }
    table { width:100%; border-collapse: collapse; margin-top:18px; }
    th, td { text-align:left; font-size: 13px; padding:8px; border-bottom:1px solid #eee; vertical-align: top; }
    .muted { color:#666; font-size:12px; }
    .pill { font-size: 11px; background:#f4f4f5; border:1px solid #e5e7eb; padding:2px 6px; border-radius: 999px; }
    .row-actions { display:flex; gap:8px; }
    .danger { background:#b91c1c; }
    .success { background:#166534; }
    .wrap { white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <header>
    <h1>Fields Admin</h1>
    <span class="muted">Create, update, and delete records in SQLite</span>
  </header>

  <section class="row">
    <input id="search" placeholder="Filter by name or FieldID…" />
    <button id="refresh">Refresh</button>
    <span id="status" class="muted"></span>
  </section>

  <section style="margin-top:18px">
    <details open>
      <summary><strong>Editor</strong> <span class="muted">(Upsert by FieldID)</span></summary>
      <div class="grid" style="margin-top:12px">
        <label>FieldID<input id="f_field_id" required /></label>
        <label>Name<input id="f_name" /></label>
        <label>Description<textarea id="f_description"></textarea></label>
        <label>File<input id="f_file" /></label>
        <label>Thumbnail<input id="f_thumbnail" /></label>
        <label>ThumbnailAlt<input id="f_thumbnail_alt" /></label>
        <label>LocationName<input id="f_location_name" /></label>
        <label>Latitude<input id="f_latitude" type="number" step="any" /></label>
        <label>Longitude<input id="f_longitude" type="number" step="any" /></label>
        <label>Audio<input id="f_audio" /></label>
        <label>DefaultMatrix (JSON)<textarea id="f_default_matrix"></textarea></label>
        <label>DefaultAnimation (JSON)<textarea id="f_default_animation"></textarea></label>

        <label>Soil Order<input id="s_order" /></label>
        <label>Soil Group<input id="s_group" /></label>
        <label>Soil SubGroup<input id="s_subgroup" /></label>
        <label>Soil Series<input id="s_series" /></label>
        <label>Horizons (comma-separated)<textarea id="s_horizons" placeholder="A, B, C"></textarea></label>

        <label>CapturedBy<input id="m_captured_by" /></label>
        <label>CaptureDate<input id="m_capture_date" placeholder="YYYY-MM-DD or raw string" /></label>
        <label>CaptureDevice<input id="m_capture_device" /></label>
        <label>CaptureFormat<input id="m_capture_format" /></label>
        <label>ColourCorrection<input id="m_colour_correction" /></label>
        <label>ProcessedBy<input id="m_processed_by" /></label>
        <label>FramesIn<input id="m_frames_in" type="number" /></label>
        <label>FramesTracked<input id="m_frames_tracked" type="number" /></label>
        <label>SoftwareEditor<input id="m_software_editor" /></label>
        <label>SoftwareTracker<input id="m_software_tracker" /></label>
        <label>ModelType<input id="m_model_type" /></label>
      </div>
      <div class="row" style="margin-top:12px">
        <button id="save" class="success">Save / Upsert</button>
        <button id="clear" class="ghost">Clear form</button>
      </div>
    </details>
  </section>

  <section>
    <table id="tbl">
      <thead>
        <tr>
          <th>FieldID</th>
          <th>Name</th>
          <th class="wrap">Location</th>
          <th>Soil (Order/Group/SubGroup)</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

<script>
const $ = (id) => document.getElementById(id);
const status = (msg) => { document.getElementById('status').textContent = msg; };

function toJSONOrNull(text) {
  if (!text || !text.trim()) return null;
  try { return JSON.parse(text); } catch { return null; }
}

function fromList(text) {
  if (!text) return [];
  return text.split(',').map(s => s.trim()).filter(Boolean);
}

function toList(arr) { return Array.isArray(arr) ? arr.join(', ') : ''; }

async function loadAll() {
  status('Loading…');
  const res = await fetch('/fields');
  const rows = await res.json();
  const term = ($('search').value || '').toLowerCase();
  const filtered = rows.filter(r =>
    !term || (r.field_id?.toLowerCase().includes(term) || r.name?.toLowerCase().includes(term))
  );
  const tbody = document.querySelector('#tbl tbody');
  tbody.innerHTML = '';
  for (const r of filtered) {
    const soil = await fetch(`/fields/${encodeURIComponent(r.field_id)}`).then(r => r.json());
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><span class="pill">${soil.FieldID}</span></td>
      <td>${soil.Name ?? ''}</td>
      <td class="wrap">${soil.LocationName ?? ''}<div class="muted">${soil.Latitude ?? ''}, ${soil.Longitude ?? ''}</div></td>
      <td>${soil.SoilProperties ? `${soil.SoilProperties.Order ?? ''} / ${soil.SoilProperties.Group ?? ''} / ${soil.SoilProperties.SubGroup ?? ''}` : ''}</td>
      <td class="row-actions">
        <button data-edit="${soil.FieldID}">Edit</button>
        <button class="danger" data-del="${soil.FieldID}">Delete</button>
      </td>`;
    tbody.appendChild(tr);
  }
  status(`Loaded ${filtered.length} of ${rows.length}`);
}

function fillForm(data) {
  $('f_field_id').value = data.FieldID ?? '';
  $('f_name').value = data.Name ?? '';
  $('f_description').value = data.Description ?? '';
  $('f_file').value = data.File ?? '';
  $('f_thumbnail').value = data.Thumbnail ?? '';
  $('f_thumbnail_alt').value = data.ThumbnailAlt ?? '';
  $('f_location_name').value = data.LocationName ?? '';
  $('f_latitude').value = data.Latitude ?? '';
  $('f_longitude').value = data.Longitude ?? '';
  $('f_audio').value = data.Audio ?? '';
  $('f_default_matrix').value = JSON.stringify(data.DefaultMatrix ?? [], null, 2);
  $('f_default_animation').value = JSON.stringify(data.DefaultAnimation ?? [], null, 2);

  const sp = data.SoilProperties || {};
  $('s_order').value = sp.Order ?? '';
  $('s_group').value = sp.Group ?? '';
  $('s_subgroup').value = sp.SubGroup ?? '';
  $('s_series').value = sp.Series ?? '';
  $('s_horizons').value = toList(sp.Horizons);

  const m = data.Metadata || {};
  $('m_captured_by').value = m.CapturedBy ?? '';
  $('m_capture_date').value = m.CaptureDate ?? '';
  $('m_capture_device').value = m.CaptureDevice ?? '';
  $('m_capture_format').value = m.CaptureFormat ?? '';
  $('m_colour_correction').value = m.ColourCorrection ?? '';
  $('m_processed_by').value = m.ProcessedBy ?? '';
  $('m_frames_in').value = m.FramesIn ?? '';
  $('m_frames_tracked').value = m.FramesTracked ?? '';
  $('m_software_editor').value = m.SoftwareEditor ?? '';
  $('m_software_tracker').value = m.SoftwareTracker ?? '';
  $('m_model_type').value = m.ModelType ?? '';
}

async function loadOne(fieldId) {
  const res = await fetch(`/fields/${encodeURIComponent(fieldId)}`);
  if (res.ok) {
    const data = await res.json();
    fillForm(data);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

async function save() {
  const payload = {
    FieldID: $('f_field_id').value.trim(),
    Name: $('f_name').value || null,
    Description: $('f_description').value || null,
    File: $('f_file').value || null,
    Thumbnail: $('f_thumbnail').value || null,
    ThumbnailAlt: $('f_thumbnail_alt').value || null,
    LocationName: $('f_location_name').value || null,
    Latitude: $('f_latitude').value ? Number($('f_latitude').value) : null,
    Longitude: $('f_longitude').value ? Number($('f_longitude').value) : null,
    Audio: $('f_audio').value || null,
    DefaultMatrix: toJSONOrNull($('f_default_matrix').value) ?? [],
    DefaultAnimation: toJSONOrNull($('f_default_animation').value) ?? [],
    SoilProperties: {
      Order: $('s_order').value || null,
      Group: $('s_group').value || null,
      SubGroup: $('s_subgroup').value || null,
      Series: $('s_series').value || null,
      Horizons: fromList($('s_horizons').value)
    },
    Metadata: {
      CapturedBy: $('m_captured_by').value || null,
      CaptureDate: $('m_capture_date').value || null,
      CaptureDevice: $('m_capture_device').value || null,
      CaptureFormat: $('m_capture_format').value || null,
      ColourCorrection: $('m_colour_correction').value || null,
      ProcessedBy: $('m_processed_by').value || null,
      FramesIn: $('m_frames_in').value ? Number($('m_frames_in').value) : null,
      FramesTracked: $('m_frames_tracked').value ? Number($('m_frames_tracked').value) : null,
      SoftwareEditor: $('m_software_editor').value || null,
      SoftwareTracker: $('m_software_tracker').value || null,
      ModelType: $('m_model_type').value || null
    }
  };

  if (!payload.FieldID) {
    alert('FieldID is required');
    return;
  }

  const res = await fetch('/admin/fields', {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
  });
  if (!res.ok) { const t = await res.text(); alert('Save failed: ' + t); return; }
  status('Saved');
  await loadAll();
}

async function del(fieldId) {
  if (!confirm(`Delete ${fieldId}? This cannot be undone.`)) return;
  const res = await fetch(`/admin/fields/${encodeURIComponent(fieldId)}`, { method: 'DELETE' });
  if (!res.ok) { const t = await res.text(); alert('Delete failed: ' + t); return; }
  status('Deleted');
  if ($('f_field_id').value === fieldId) document.querySelector('form')?.reset?.();
  await loadAll();
}

$('refresh').onclick = loadAll;
$('save').onclick = save;
$('clear').onclick = () => { fillForm({}); };
$('search').oninput = () => { loadAll(); };

// table actions (event delegation)
addEventListener('click', (e) => {
  const edit = e.target.closest('[data-edit]');
  const delBtn = e.target.closest('[data-del]');
  if (edit) loadOne(edit.dataset.edit);
  if (delBtn) del(delBtn.dataset.del);
});

loadAll();
</script>
</body>
</html>
